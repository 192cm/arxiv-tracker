# Gemini 모델
#   gemini-3.1-flash  : 빠르고 저렴 (무료 티어 충분, 일반 추천)
#   gemini-3.1-pro    : 더 정확하지만 느리고 토큰 한도 빠르게 소진
summary_model: "gemini-3.1-flash-lite"

# 한 호출당 최대 출력 토큰
max_output_tokens: 1024

# ==========================================
# arXiv 검색 설정
# ==========================================
# 카테고리 코드: https://arxiv.org/category_taxonomy
categories:
  - cs.CL    # Computation and Language (NLP, LLM의 본진)
  - cs.LG    # Machine Learning
  - cs.AI    # Artificial Intelligence

# 제목/abstract에 이 키워드들 중 하나라도 들어가야 통과
keywords:
  - "large language model"
  - "LLM"
  - "language model"
  - "in-context learning"
  - "chain-of-thought"
  - "RAG"
  - "retrieval-augmented"
  - "LLM agent"
  - "tool use"
  - "fine-tuning"
  - "instruction tuning"
  - "RLHF"
  - "alignment"
  - "prompt"

# 한 번에 가져올 최대 논문 수
max_results: 50

# 며칠치 가져올지
days_back: 3
